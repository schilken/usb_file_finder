version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  collection: ^1.19.0
  desktop_multi_window: ^0.3.0
  macos_ui: ^2.2.2
  flutter_riverpod: ^3.3.1
  file_picker: ^10.3.10
